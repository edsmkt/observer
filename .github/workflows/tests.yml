name: Tests

on:
  push:
  pull_request:

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Observer and browser test dependencies
        run: python -m pip install -e ".[browser-test]"
      - name: Install Chromium
        run: python -m playwright install --with-deps chromium
      - name: Run acceptance suite
        env:
          OBSERVER_REQUIRE_BROWSER_TEST: "1"
        run: python -B -m observer_kit test
